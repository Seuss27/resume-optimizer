name: CI Pipeline - Lint & Security

# Trigger the workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install CI Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 bandit
        # We also install the project requirements to ensure syntax is valid
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Check Formatting (Black)
      run: |
        # --check fails the pipeline if files are not formatted correctly
        black --check .

    - name: Lint Code (Flake8)
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all other issues as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Security Scan (Bandit)
      run: |
        # Recursively scan all Python files, skipping the virtual environment if accidentally committed
        bandit -r . -x ./.venv/,-./venv/
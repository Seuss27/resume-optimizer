name: CI Pipeline - Lint & Security

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Project & Dev Dependencies
      run: |
        python -m pip install --upgrade pip
        # Installs the local package in editable mode along with your dev tools
        pip install -e .[dev]

    - name: Run Test Suite
      run: |
        python -m pytest -q

    - name: Run Ruff Format Check
      run: |
        # Verifies formatting compliance without modifying code
        ruff format --check .

    - name: Run Ruff Linter & Security Scan (Bandit rules)
      run: |
        # Runs linting, import checks, and full security scans seamlessly
        ruff check .